controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    diff_cont:
      type: diff_drive_controller/DiffDriveController

    pan_tilt_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_cont:
  ros__parameters:
    left_wheel_names:  ['left_front_wheel_joint', 'left_rear_wheel_joint']
    right_wheel_names: ['right_front_wheel_joint', 'right_rear_wheel_joint']

    # NOTE: wheels are closer together now — re-measure and tune these.
    wheel_separation: 0.26   # metres (centre-to-centre, left↔right)
    wheel_radius:     0.072  # metres

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    open_loop: false
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    use_stamped_vel: true   # receives geometry_msgs/TwistStamped on ~/cmd_vel

pan_tilt_controller:
  ros__parameters:
    joints:
      - pan_joint
      - tilt_joint

    command_interfaces:
      - position

    state_interfaces:
      - position

    # Open-loop servos: state mirrors last command, so keep tolerances loose.
    allow_partial_joints_goal: false
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0

joint_broad:
  ros__parameters:
    extra_joints: []
