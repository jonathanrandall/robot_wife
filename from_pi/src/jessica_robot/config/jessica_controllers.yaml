controller_manager:
  ros__parameters:
    update_rate: 30  # Hz (33ms budget; serial GET/STATE round-trip must fit inside this)

    diff_cont:
      type: diff_drive_controller/DiffDriveController

    pan_tilt_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_cont:
  ros__parameters:
    left_wheel_names:  ['left_front_wheel_joint', 'left_rear_wheel_joint']
    right_wheel_names: ['right_front_wheel_joint', 'right_rear_wheel_joint']

    # From the real gobilda build (jessica_description dimensions.xacro):
    # track = 2 x wheel_sep_y = 2 x 0.156. Skid-steer scrub means the EFFECTIVE
    # separation is usually a bit larger — calibrate with the twirl test
    # (command 1 rotation, scale this by actual/commanded rotation).
    wheel_separation: 0.282  # metres (centre-to-centre, left↔right)
    wheel_radius:     0.060  # metres (gobilda 3601-0014-0120)

    publish_rate: 30.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    open_loop: false
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    use_stamped_vel: true   # receives geometry_msgs/TwistStamped on ~/cmd_vel

pan_tilt_controller:
  ros__parameters:
    joints:
      - pan_joint
      - tilt_joint

    command_interfaces:
      - position

    state_interfaces:
      - position

    # Open-loop servos: state mirrors last command, so keep tolerances loose.
    allow_partial_joints_goal: false
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0

# joint_broad (joint_state_broadcaster) needs no params — it publishes all
# hardware joints by default. NOTE: do NOT add `extra_joints: []` here — an
# empty YAML list has no inferable type and makes the controller fail to load
# ("parameter_value_from failed for parameter 'extra_joints'"), which silently
# kills /joint_states.
